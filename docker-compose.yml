services:
  theseus-insight-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theseus_insight_service
    ports:
      - "8000:8000" # Maps host port 8000 to container port 8000
    env_file:
      - .env # Loads environment variables from .env file in the project root
    volumes:
      # Mounts the local ./data directory to /app/data in the container
      # Stores generated files (newsletters, podcasts, etc.)
      - ./data:/app/data
      # Optional: If you want to live-reload backend code changes during development (not for production)
      # - ./theseus_insight:/app/theseus_insight
      # - ./main.py:/app/main.py
      # - ./config:/app/config 
      # Note: For live-reloading frontend, a different setup (e.g. running Vite dev server and proxying from FastAPI) is usually needed.
    environment:
      # You can also define environment variables directly here, 
      # though .env file is generally preferred for sensitive or numerous variables.
      # Example: 
      # - OPENAI_API_KEY=${OPENAI_API_KEY_FROM_HOST_ENV} # If you want to pass from host env differently
      - DATABASE_URL=postgresql://theseus:theseus@db:5432/theseusdb
      - PYTHONUNBUFFERED=1 # Already set in Dockerfile, but good to be explicit if needed
      - OLLAMA_PASSTHROUGH=${OLLAMA_PASSTHROUGH:-true}
    depends_on:
      db:
        condition: service_healthy
    # healthcheck: # Optional: Add a healthcheck for your FastAPI app
    #   test: ["CMD", "curl", "--fail", "http://localhost:8000/api/settings/model-providers"] # Example endpoint
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s # Give some time for the app to start

  db:
    image: pgvector/pgvector:pg14
    environment:
      POSTGRES_USER: theseus
      POSTGRES_PASSWORD: theseus
      POSTGRES_DB: theseusdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theseus -d theseusdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount setup script to handle complete database initialization
      - ./scripts/setup_database.sh:/docker-entrypoint-initdb.d/setup_database.sh
      # Mount SQL files to separate directory for setup script to access
      - ./scripts/000_migration_compatibility.sql:/app/sql/000_migration_compatibility.sql
      - ./scripts/001_init_schema_postgres.sql:/app/sql/001_init_schema_postgres.sql
      - ./scripts/002_migrate_to_profiles.sql:/app/sql/002_migrate_to_profiles.sql
      - ./scripts/003_profiles_trends_integration.sql:/app/sql/003_profiles_trends_integration.sql
      - ./scripts/004_add_staging_tables.sql:/app/sql/004_add_staging_tables.sql
      - ./scripts/005_optimize_indexes.sql:/app/sql/005_optimize_indexes.sql
      - ./scripts/006_add_processing_checkpoints.sql:/app/sql/006_add_processing_checkpoints.sql
      - ./scripts/007_add_scheduled_tasks.sql:/app/sql/007_add_scheduled_tasks.sql
      - ./scripts/008_add_multi_ollama_support.sql:/app/sql/008_add_multi_ollama_support.sql
      - ./scripts/009_add_lmstudio_multi_server.sql:/app/sql/009_add_lmstudio_multi_server.sql
      - ./scripts/010_add_per_server_model_config.sql:/app/sql/010_add_per_server_model_config.sql
      - ./scripts/011_newsletter_multi_server.sql:/app/sql/011_newsletter_multi_server.sql
      # Mount migration tracking files
      - ./scripts/create_migration_tracking.sql:/app/sql/create_migration_tracking.sql
      - ./scripts/check_and_apply_migrations.sh:/app/sql/check_and_apply_migrations.sh

volumes:
  postgres_data:
