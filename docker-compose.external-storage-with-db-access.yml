# Docker Compose override file for external storage + database access
# Usage: docker-compose -f docker-compose.yml -f docker-compose.external-storage-with-db-access.yml up
#
# This override file combines:
# 1. External storage configuration (redirects data to external drive)
# 2. Database external access (exposes PostgreSQL port for external connections)
#
# SECURITY WARNING: Only use this in development environments or secure networks.
# The database will be accessible from the host machine and potentially other network clients.

services:
  theseus-insight-app:
    volumes:
      # Override the default ./data mount to use external storage
      - ${EXTERNAL_DATA_PATH:-/Volumes/Metis/theseus_insight_data}/app_data:/app/data

  db:
    ports:
      # Expose PostgreSQL on host port 5433 to avoid conflicts with local PostgreSQL
      # Connect using: psql -h localhost -p 5433 -U theseus -d theseusdb
      - "5433:5432"
    volumes:
      # Override the default named volume to use external storage for PostgreSQL data
      - ${EXTERNAL_DATA_PATH:-/Volumes/Metis/theseus_insight_data}/postgres_data:/var/lib/postgresql/data
      # Keep the setup script mount as-is
      - ./scripts/setup_database.sh:/docker-entrypoint-initdb.d/setup_database.sh
    environment:
      # Allow connections from all addresses (required for external access)
      POSTGRES_HOST_AUTH_METHOD: md5
    # Additional configuration for external access
    command: >
      postgres
      -c listen_addresses='*'
      -c max_connections=100
      -c shared_preload_libraries=vector 